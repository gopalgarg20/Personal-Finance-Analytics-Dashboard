<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

</head>
<body>
<div class="dashboard-container">
    <aside class="sidebar"><div class="logo"><i class="fa-solid fa-wallet"></i><h2>Finova</h2></div><ul class="menu"><li><a href="dashboard.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a></li><li><a href="analytics.html"><i class="fa-solid fa-chart-line"></i><span>Analytics</span></a></li><li><a href="transactions.html"><i class="fa-solid fa-money-bill-transfer"></i><span>Transactions</span></a></li><li class="active"><a href="budget.html"><i class="fa-solid fa-wallet"></i><span>Budget</span></a></li><li><a href="goals.html"><i class="fa-solid fa-bullseye"></i><span>Goals</span></a></li><li><a href="reports.html"><i class="fa-solid fa-file-lines"></i><span>Reports</span></a></li><li><a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a></li></ul></aside>
    <main class="main-content budget-page">
        <header class="navbar"><div></div><div class="nav-right"><button id="themeToggle" class="icon-btn"><i id="themeIcon" class="fa-solid fa-moon"></i></button></div></header>
        <section class="dashboard-header"><div><h1>Budget</h1><p>Set spending limits and stay in control of your money.</p></div><button id="openBudgetModal" class="primary-btn"><i class="fa-solid fa-plus"></i>Add Budget</button></section>
        <section id="budgetSummary" class="budget-summary"></section><section id="budgetList" class="budget-list"></section>
    </main>
</div>
<div id="budgetModal" class="modal hidden"><div class="modal-content small-modal"><div class="modal-header"><h2>Add Budget</h2><button id="closeBudgetModal"><i class="fa-solid fa-xmark"></i></button></div><form id="budgetForm"><label class="form-group"><span>Category</span><select id="budgetCategory"></select></label><label class="form-group"><span>Monthly Limit</span><input id="budgetLimit" type="number" min="1" required></label><div class="modal-actions"><button type="submit" class="primary-btn">Save Budget</button></div></form></div></div>
<script src="../scripts/localStorage.js"></script><script src="../scripts/utils.js"></script><script src="../scripts/budget.js"></script>
