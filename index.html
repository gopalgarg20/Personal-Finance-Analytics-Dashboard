<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Finova | Smart Personal Finance Dashboard</title>

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Main CSS -->

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- ==========================================================
                            LOGIN PAGE
    =========================================================== -->

    <main class="login-page">

        <section class="login-container">

            <!-- Logo -->

            <div class="login-logo">

                <div class="logo-icon">
                    <i class="fa-solid fa-wallet"></i>
                </div>

                <h1>Finova</h1>

                <p>
                    Smart Personal Finance Dashboard
                </p>

            </div>

            <!-- Login Card -->

            <div class="login-card">

                <div class="login-header">

                    <h2>Welcome Back 👋</h2>

                    <p>
                        Sign in to continue managing your finances.
                    </p>

                </div>

                <!-- Login Form -->

                <form id="loginForm">

                    <!-- Email -->

                    <div class="form-group">

                        <label for="email">

                            Email Address

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="email"
                                placeholder="Enter your email"
                                required>

                        </div>

                    </div>

                    <!-- Password -->

                    <div class="form-group">

                        <label for="password">

                            Password

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="password"
                                placeholder="Enter your password"
                                required>

                            <button
                                type="button"
                                id="togglePassword"
                                class="password-toggle">

                                <i class="fa-solid fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Remember -->

                    <div class="login-options">

                        <label class="remember-me">

                            <input
                                type="checkbox"
                                id="rememberUser">

                            <span>

                                Remember Me

                            </span>

                        </label>

                        <a href="#"
                           id="forgotPassword"
                           class="forgot-password">
                            Forgot Password?
                        </a>

                    </div>

                    <!-- Login Button -->

                    <button
                        type="submit"
                        id="loginButton"
                        class="primary-btn">

                        <i class="fa-solid fa-right-to-bracket"></i>

                        Login

                    </button>

                </form>

                <!-- Divider -->

                <div class="divider">

                    <span>

                        OR

                    </span>

                </div>

                <!-- Social Login -->

                <div class="social-login">

                    <button class="google-login">

                        <i class="fa-brands fa-google"></i>

                        Continue with Google

                    </button>

                    <button class="github-login">

                        <i class="fa-brands fa-github"></i>

                        Continue with GitHub

                    </button>

                </div>

                <!-- Footer -->

                <div class="login-footer">

                    <p>

                        Don't have an account?

                    <a href="#"
                       id="createAccount">
                        Create Account
                    </a>

                    </p>

                </div>

            </div>

        </section>
            </main>

    
            <!-- ==========================================
        CREATE ACCOUNT MODAL
========================================== -->

<div class="modal-overlay" id="registerModal">

    <div class="modal-card">

        <h2>Create Account</h2>

        <form id="registerForm">

            <input
                type="text"
                id="registerName"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="registerEmail"
                placeholder="Email"
                required>

            <input
                type="password"
                id="registerPassword"
                placeholder="Password"
                required>

            <input
                type="password"
                id="registerConfirmPassword"
                placeholder="Confirm Password"
                required>

            <button type="submit">
                Create Account
            </button>

            <button
                type="button"
                id="closeRegister">
                Cancel
            </button>

        </form>

    </div>

</div>
<div class="modal-overlay" id="forgotModal">

    <div class="modal-card">

        <h2>Forgot Password</h2>

        <form id="forgotForm">

            <input
                type="email"
                id="forgotEmail"
                placeholder="Enter your email"
                required>

            <button type="submit">
                Reset Password
            </button>

            <button
                type="button"
                id="closeForgot">
                Cancel
            </button>

        </form>

    </div>

</div>
    <!-- ==========================================
                JAVASCRIPT FILES
    =========================================== -->

<script src="scripts/auth.js"></script>


</body>

</html>
